risk_regimes:
  soft_derisk:
    # Aligned with intent_model soft zone (84.9%) - gradual throttling starts here
    threshold_pct: 85
    addnewpos_step_multiplier: 0.25
    engines_throttled:
    - ADDNEWPOS
  hard_derisk:
    # Aligned with ExposureThresholdServiceV2 current_threshold (92%)
    threshold_pct: 92
    cancel_risk_increasing: true
    only_reduce_positions: true
    spread_penalty_active: true
  close:
    time_window_start: '15:00'
    time_window_end: '16:00'
    allow_addnewpos: false
    force_reduce_residual: true
  spread_rules:
    addnewpos_spread_blocks: false
    addnewpos_spread_log_threshold: 0.3
    derisk_spread_penalty: true
order_lifecycle:
  ttl_by_category:
    LT_TRIM: 120
    MM_CHURN: 60
    ADDNEWPOS: 180
    KARBOTU: 120
    REDUCEMORE: 90
    HARD_DERISK: 30
    CLOSE_EXIT: 15
    DEFAULT: 90
  min_replace_interval_seconds: 2.5
  price_change_threshold_cents: 1
  stale_data_threshold_seconds: 90
  selective_cancel_enabled: true
  allow_emergency_cancel_all: false
orchestrator:
  enabled: false
  mode: FULL
  phase_tick_seconds: 30
  phases:
    PRE_MARKET:
      start: 04:00
      end: 09:30
      engines: []
      allow_addnewpos: false
    OPEN:
      start: 09:30
      end: '10:00'
      engines:
      - LT_TRIM
      - MM_CHURN
      - KARBOTU
      allow_addnewpos: false
    ACTIVE:
      start: '10:00'
      end: '14:00'
      engines:
      - LT_TRIM
      - MM_CHURN
      - ADDNEWPOS
      - KARBOTU
      - REDUCEMORE
      allow_addnewpos: true
    MIDDAY:
      start: '14:00'
      end: '15:00'
      engines:
      - LT_TRIM
      - MM_CHURN
      - KARBOTU
      allow_addnewpos: false
    CLOSE:
      start: '15:00'
      end: '16:00'
      engines:
      - LT_TRIM
      - HARD_EXIT
      allow_addnewpos: false
legacy_psfalgo:
  legacy_runall_enabled: true
  legacy_autocycle_enabled: false
presets:
  conservative:
    description: Düşük risk, küçük pozisyonlar
    exposure.defensive_threshold_percent: 80
    exposure.offensive_threshold_percent: 75
    risk_regimes.soft_derisk.threshold_pct: 75
    risk_regimes.hard_derisk.threshold_pct: 80
    addnewpos.settings.max_lot_per_symbol: 100
  aggressive:
    description: Yüksek risk, büyük pozisyonlar
    exposure.defensive_threshold_percent: 100
    exposure.offensive_threshold_percent: 95
    risk_regimes.soft_derisk.threshold_pct: 90
    risk_regimes.hard_derisk.threshold_pct: 95
    addnewpos.settings.max_lot_per_symbol: 500
  default: null
intent_model:
  type: piecewise_v1
  # Hard threshold MUST match ExposureThresholdServiceV2 current_threshold (92%)
  # so that intent gradual throttling happens BEFORE hard risk cuts ADDNEWPOS abruptly.
  # Soft zone = 92 * 12/13 ≈ 84.9% → gradual AddIntent reduction from 20→0
  # Hard zone = 92% → AddIntent=0 (matches ThresholdServiceV2 hard risk)
  hard_threshold_pct: 92
  soft_ratio_num: 12
  soft_ratio_den: 13
  Amax: 100
  Asoft: 20
  pn: 1.25
  q: 2.14
  ps: 1.5
lot_policy:
  base_lot_default: 1000
  k_multiplier_default: 1
  rounding:
    min_trade_lot: 200
    no_trade_below_raw: 100
  post_trade_hold_min: 200
gating:
