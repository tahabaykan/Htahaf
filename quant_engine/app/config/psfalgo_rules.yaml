version: 2.0.0
general:
  cycle:
    interval_seconds: 240
    order_wait_seconds: 120
    auto_cancel_after_seconds: 120
    lot_divider_enabled: true
    controller_on_enabled: true
  intent:
    ttl_seconds: 90
    max_intents_per_cycle: 50
    auto_expire_enabled: true
  befday_tracking:
