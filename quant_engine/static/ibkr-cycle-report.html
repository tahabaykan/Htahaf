    <style>

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-pink: #ec4899;
            --glow-blue: rgba(59, 130, 246, 0.15);
            --glow-green: rgba(16, 185, 129, 0.15);
            --glow-red: rgba(239, 68, 68, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
        }

        .header {
            text-align: center;
            padding: 32px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .header .date-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--accent-blue);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-blue);
            box-shadow: 0 4px 20px var(--glow-blue);
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-card .label {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-card.green .value {
            color: var(--accent-green);
        }

        .stat-card.red .value {
            color: var(--accent-red);
        }

        .stat-card.blue .value {
            color: var(--accent-blue);
        }

        .stat-card.orange .value {
            color: var(--accent-orange);
        }

        .stat-card.purple .value {
            color: var(--accent-purple);
        }

        .stat-card.cyan .value {
            color: var(--accent-cyan);
        }

        .stat-card.pink .value {
            color: var(--accent-pink);
        }

        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section h2 .icon {
            font-size: 1.4rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            text-align: left;
            padding: 10px 12px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(30, 41, 59, 0.5);
            color: var(--text-secondary);
        }

        tr:hover td {
            background: rgba(59, 130, 246, 0.05);
        }

        .buy {
            color: var(--accent-green);
            font-weight: 600;
        }

        .sell {
            color: var(--accent-red);
            font-weight: 600;
        }

        .tag-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-lt {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .tag-kb {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
        }

        .tag-mm {
            background: rgba(6, 182, 212, 0.15);
            color: #22d3ee;
        }

        .tag-fr {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .tag-rev {
            background: rgba(236, 72, 153, 0.15);
            color: #f472b6;
        }

        .tag-other {
            background: rgba(100, 116, 139, 0.15);
            color: #94a3b8;
        }

        .success-badge {
            color: var(--accent-green);
            font-weight: 600;
        }

        .fail-badge {
            color: var(--accent-red);
            font-weight: 600;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 120px;
            padding: 8px 0;
        }

        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 0;
        }

        .bar {
            width: 100%;
            max-width: 60px;
            border-radius: 4px 4px 0 0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .bar:hover {
            opacity: 0.8;
            transform: scaleY(1.05);
            transform-origin: bottom;
        }

        .bar-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: center;
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .scrollable {
            max-height: 500px;
            overflow-y: auto;
        }

        .scrollable::-webkit-scrollbar {
            width: 6px;
        }

        .scrollable::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .scrollable::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .two-col {
                grid-template-columns: 1fr;
            }
        }

        .error-line {
            background: rgba(239, 68, 68, 0.08);
            border-left: 3px solid var(--accent-red);
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 0 6px 6px 0;
            font-family: monospace;
            font-size: 0.78rem;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .warn-line {
            background: rgba(245, 158, 11, 0.08);
            border-left: 3px solid var(--accent-orange);
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 0 6px 6px 0;
            font-family: monospace;
            font-size: 0.78rem;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.78rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .chip:hover,
        .chip.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }
    </style>

        function getTagClass(tag) {
            if (tag.startsWith('LT_')) return 'tag-lt';
            if (tag.startsWith('KARBOTU')) return 'tag-kb';
            if (tag.startsWith('MM_')) return 'tag-mm';
            if (tag.startsWith('FR_')) return 'tag-fr';
            if (tag.startsWith('REV')) return 'tag-rev';
            return 'tag-other';
        }

        function renderStats() {
            const s = DATA.summary;
            const cards = [
                { value: s.total_orders, label: 'Total Orders Sent', cls: 'blue' },
                { value: s.total_fills, label: 'Fills Received', cls: 'green' },
                { value: s.unique_symbols, label: 'Unique Symbols', cls: 'cyan' },
                { value: s.rev_success, label: 'REV Success', cls: 'purple' },
                { value: s.rev_failed, label: 'REV Failed', cls: 'red' },
                { value: s.total_cancel_orders, label: 'Orders Cancelled', cls: 'orange' },
                { value: s.exposure_blocks, label: 'Exposure Blocks', cls: 'pink' },
                { value: s.total_errors, label: 'Errors', cls: 'red' },
            ];
            document.getElementById('statsGrid').innerHTML = cards.map(c => `
            <div class="stat-card ${c.cls}">
                <div class="value">${c.value.toLocaleString()}</div>
                <div class="label">${c.label}</div>
            </div>
        `).join('');
        }

        function renderTagChart() {
            const tags = Object.entries(DATA.tag_counts).sort((a, b) => b[1] - a[1]);
            const maxVal = Math.max(...tags.map(t => t[1]));

            // Chart
            document.getElementById('tagChart').innerHTML = tags.slice(0, 15).map(([tag, count]) => {
                const height = Math.max(4, (count / maxVal) * 100);
                const color = tag.startsWith('LT_') ? '#3b82f6' :
                    tag.startsWith('KARBOTU') ? '#8b5cf6' :
                        tag.startsWith('MM_') ? '#06b6d4' :
                            tag.startsWith('FR_') ? '#f59e0b' : '#64748b';
                return `<div class="bar-group">
                <div class="bar" style="height:${height}px;background:${color}" title="${tag}: ${count}"></div>
                <div class="bar-label">${tag.replace('KARBOTU_', 'KB_').replace('_STEP_', '_S').replace('_DEC', '').replace('_INC', '')}</div>
            </div>`;
            }).join('');

            // Table
            document.getElementById('tagTable').innerHTML = `<table>
            <tr><th>Tag</th><th>Count</th><th>%</th><th>Type</th></tr>
            ${tags.map(([tag, count]) => {
                const pct = ((count / DATA.summary.total_orders) * 100).toFixed(1);
                const type = tag.startsWith('LT_') ? 'LT Trim' :
                    tag.startsWith('KARBOTU') ? 'Karbotu' :
                        tag.startsWith('MM_') ? 'Market Making' :
                            tag.startsWith('FR_') ? 'Frontlama' : 'Other';
                return `<tr>
                    <td><span class="tag-badge ${getTagClass(tag)}">${tag}</span></td>
                    <td>${count}</td>
                    <td>${pct}%</td>
                    <td>${type}</td>
                </tr>`;
            }).join('')}
        </table>`;
        }

        function renderFills() {
            const fills = DATA.fills;
            document.getElementById('fillCount').textContent = fills.length;
            document.getElementById('fillsTable').innerHTML = `<table>
            <tr><th>Time</th><th>Symbol</th><th>Action</th><th>Qty</th><th>Price</th><th>Bench</th></tr>
            ${fills.map(f => `<tr>
                <td>${f.ts}</td>
                <td><strong>${f.symbol}</strong></td>
                <td class="${f.action.toLowerCase()}">${f.action}</td>
                <td>${f.qty}</td>
                <td>$${f.price.toFixed(2)}</td>
                <td>$${f.bench.toFixed(2)}</td>
            </tr>`).join('')}
        </table>`;
        }

        function renderRevOrders() {
            const revs = DATA.rev_sends;
            document.getElementById('revCount').textContent = revs.length;
            document.getElementById('revTable').innerHTML = `<table>
            <tr><th>Time</th><th>Symbol</th><th>Action</th><th>Qty</th><th>Price</th><th>Status</th></tr>
            ${revs.map(r => `<tr>
                <td>${r.ts}</td>
                <td><strong>${r.symbol || '?'}</strong></td>
                <td class="${(r.action || '').toLowerCase()}">${r.action || '-'}</td>
                <td>${r.qty || '-'}</td>
                <td>${r.price ? '$' + r.price.toFixed(2) : '-'}</td>
                <td>${r.status === 'SUCCESS' ?
                    '<span class="success-badge">✅ SUCCESS</span>' :
                    '<span class="fail-badge">❌ ' + (r.reason || 'FAILED') + '</span>'}</td>
            </tr>`).join('')}
        </table>`;
        }

        function renderExpBlocks() {
            const blocks = DATA.exposure_blocks;
            document.getElementById('expBlockCount').textContent = blocks.length;
            document.getElementById('expBlocksDiv').innerHTML = blocks.map(b =>
                `<div class="warn-line">⏰ ${b.ts} — Free Exposure: <strong>${b.free}%</strong> → MM INCREASE SKIPPED</div>`
            ).join('');
        }

        function renderErrors() {
            const errs = DATA.errors;
            document.getElementById('errorCount').textContent = errs.length;
            document.getElementById('errorsDiv').innerHTML = errs.map(e =>
                `<div class="error-line">${e.ts} — ${e.line.substring(e.line.indexOf('|') + 1).trim().substring(0, 180)}</div>`
            ).join('') || '<div style="color:var(--text-muted);padding:12px;">No critical errors 🎉</div>';
        }

        function renderCancels() {
            const cancels = DATA.cancels;
            document.getElementById('cancelCount').textContent = cancels.length;
            document.getElementById('cancelTable').innerHTML = `<table>
            <tr><th>Time</th><th>Orders Cancelled</th></tr>
            ${cancels.map(c => `<tr>
                <td>${c.ts}</td>
                <td><strong>~${c.count}</strong> orders</td>
            </tr>`).join('')}
        </table>`;
        }

        function renderMinMax() {
            const blocks = DATA.minmax_blocks;
            if (blocks.length > 0) {
                document.getElementById('minmaxSection').style.display = 'block';
                document.getElementById('minmaxCount').textContent = blocks.length;
                document.getElementById('minmaxDiv').innerHTML = blocks.map(b =>
                    `<div class="warn-line">${b.ts} — ${b.line.substring(b.line.indexOf('|') + 1).trim().substring(0, 180)}</div>`
                ).join('');
            }
        }

        function renderSymbolTable(filter) {
            let details = DATA.symbol_details;
            if (filter && filter !== 'ALL') {
                details = details.filter(d => d.tags.some(t => {
                    if (filter === 'LT_TRIM') return t.startsWith('LT_');
                    if (filter === 'KARBOTU') return t.startsWith('KARBOTU');
                    if (filter === 'MM') return t.startsWith('MM_');
                    if (filter === 'FR') return t.startsWith('FR_');
                    return false;
                }));
            }

            document.getElementById('symbolTable').innerHTML = `<table>
            <tr><th>Symbol</th><th>Orders</th><th>BUY</th><th>SELL</th><th>Buy Qty</th><th>Sell Qty</th><th>Fills</th><th>Fill Qty</th><th>Tags</th></tr>
            ${details.map(d => `<tr>
                <td><strong>${d.symbol}</strong></td>
                <td>${d.total_orders}</td>
                <td class="buy">${d.buys}</td>
                <td class="sell">${d.sells}</td>
                <td>${d.total_buy_qty.toLocaleString()}</td>
                <td>${d.total_sell_qty.toLocaleString()}</td>
                <td>${d.fills > 0 ? '<span class="success-badge">' + d.fills + '</span>' : '0'}</td>
                <td>${d.fill_qty > 0 ? d.fill_qty.toLocaleString() : '-'}</td>
                <td>${d.tags.map(t => `<span class="tag-badge ${getTagClass(t)}">${t.replace('KARBOTU_', 'KB_').replace('_STEP_', '_S')}</span>`).join(' ')}</td>
            </tr>`).join('')}
        </table>`;
        }

        function renderFilterChips() {
            const filters = ['ALL', 'LT_TRIM', 'KARBOTU', 'MM', 'FR'];
            document.getElementById('filterChips').innerHTML = filters.map(f =>
                `<button class="chip ${f === 'ALL' ? 'active' : ''}" onclick="applyFilter('${f}', this)">${f}</button>`
            ).join('');
        }

        function applyFilter(filter, el) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderSymbolTable(filter);
        }

        // Initialize
        renderStats();
        renderTagChart();
        renderFills();
        renderRevOrders();
        renderExpBlocks();
        renderErrors();
        renderCancels();
        renderMinMax();
        renderFilterChips();
        renderSymbolTable('ALL');
    </script>
</body>

</html>
